<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Пірати - Мультиакаунт</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a120b; 
            color: #f5ebe0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            background: #3c2a21; 
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid #d4a373; 
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: #d4a373;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .login-container {
            background: #2f1f17;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            border: 1px solid #4a3525;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .login-container h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #e6ccb2;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #b79477;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #4a3525;
            background: #1a120b;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus {
            border-color: #d4a373;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .debug-box {
            background: #000;
            color: #00ff00;
            font-family: monospace;
            font-size: 0.8rem;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: left;
            border: 1px solid #333;
        }

        .terms-group {
            display: flex;
            align-items: flex-start;
            text-align: left;
            margin-bottom: 20px;
            gap: 10px;
            cursor: pointer;
        }

        .terms-group input {
            margin-top: 3px;
            transform: scale(1.2);
            accent-color: #d4a373;
        }

        .terms-group span {
            font-size: 0.85rem;
            color: #cbb29c;
            line-height: 1.3;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #d4a373;
            border: none;
            border-radius: 6px;
            color: #1a120b;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .submit-btn:hover {
            background: #e6ccb2;
        }

        .submit-btn:disabled {
            background: #5c4d41;
            color: #8c7665;
            cursor: not-allowed;
        }

        .tavern-content {
            background: #1a120b;
            padding: 25px;
            border-radius: 8px;
            border: 1px dashed #d4a373;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
        }

        .change-user-btn {
            background: transparent;
            border: none;
            color: #8c7665;
            font-size: 0.8rem;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .change-user-btn:hover {
            color: #d4a373;
        }

        #loadingScreen {
            font-size: 1.2rem;
            color: #d4a373;
            margin: auto;
        }

        footer {
            padding: 15px;
            font-size: 0.8rem;
            color: #654e3c;
        }
    </style>
</head>
<body>

    <header>
        <h1>☠ Пірати ☠</h1>
    </header>

    <main id="loadingScreen">
        <p>⚓ Перевірка суднового журналу... 🌊</p>
    </main>

    <main id="authScreen" class="login-container" style="display: none;">
        <h2>Створи нового капітана</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Ім'я пірата (Нікнейм):</label>
                <input type="text" id="username" placeholder="Наприклад, Чорна Борода" required autocomplete="off" maxlength="20">
                <div id="usernameError" class="error-msg">Йо-хо-хо! Цей нікнейм уже зайнятий іншим піратом!</div>
            </div>

            <label class="terms-group">
                <input type="checkbox" id="termsCheckbox">
                <span>Я підтверджую умови гри.</span>
            </label>

            <button type="submit" id="submitBtn" class="submit-btn">Підняти вітрила</button>
            
            <div id="debugConsole" class="debug-box">Лог: Готовність до створення.</div>
        </form>
    </main>

    <main id="tavernScreen" class="login-container" style="display: none;">
        <h2>🍻 Портова Таверна 🍻</h2>
        <div class="tavern-content">
            <span id="tavernGreeting">Привіт, Капітане!</span>
        </div>
        <button class="submit-btn" style="background: #b79477;">Замовити ром</button>
        
        <button id="changeUserBtn" class="change-user-btn">Новий персонаж (Змінити)</button>
    </main>

    <footer>
        &copy; 2026 Гра "Пірати".
    </footer>

    <script>
        const debug = document.getElementById('debugConsole');
        function log(message) {
            if(debug) debug.innerText = "Лог: " + message;
        }

        const SUPABASE_URL = "https://gihdsrwyvonaewyngwnu.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_ldLuj_izEdq5ZKYfcOuojg_kiZB42In";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const tg = window.Telegram.WebApp;
        tg.expand();

        const loadingScreen = document.getElementById('loadingScreen');
        const authScreen = document.getElementById('authScreen');
        const tavernScreen = document.getElementById('tavernScreen');
        const tavernGreeting = document.getElementById('tavernGreeting');

        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const usernameError = document.getElementById('usernameError');
        const termsCheckbox = document.getElementById('termsCheckbox');
        const submitBtn = document.getElementById('submitBtn');
        const changeUserBtn = document.getElementById('changeUserBtn');

        const tgUser = tg.initDataUnsafe?.user;
        
        // Для браузерних тестів залишаємо один фіксований ID сесії, щоб імітувати реальний ТГ акаунт
        if (!sessionStorage.getItem('browser_test_id')) {
            sessionStorage.setItem('browser_test_id', "TG_User_Test_999");
        }
        const tgId = tgUser ? String(tgUser.id) : sessionStorage.getItem('browser_test_id');

        // --- ЛОГІКА АВТОЛОГІНУ ---
        async function checkAutoLogin() {
            // А. Перевіряємо локальну пам'ять пристрою (чи заходив уже кимось конкретним)
            const activePirate = localStorage.getItem('active_pirate_name');
            
            if (activePirate) {
                openTavern(activePirate);
                return;
            }

            // Б. Якщо в локальній пам'яті порожньо, шукаємо останнього створеного перса в БД для цього ТГ ІД
            try {
                const { data: players, error } = await supabase
                    .from('players')
                    .select('pirate_name')
                    .eq('tg_id', tgId)
                    .order('created_at', { ascending: false }); // Сортуємо: свіжіші спочатку

                if (error) throw error;

                if (players && players.length > 0) {
                    // Якщо в базі знайдено персонажів для цього ТГ — беремо найновішого (першого у списку)
                    const latestPirate = players[0].pirate_name;
                    localStorage.setItem('active_pirate_name', latestPirate);
                    openTavern(latestPirate);
                } else {
                    // Якщо цей ТГ акаунт взагалі ще не має жодного перса
                    showAuthScreen();
                }
            } catch (err) {
                console.error(err);
                showAuthScreen();
                log("Помилка завантаження: " + err.message);
            }
        }

        function openTavern(name) {
            loadingScreen.style.display = 'none';
            authScreen.style.display = 'none';
            tavernGreeting.innerText = `Привіт, Капітане ${name}! 👋`;
            tavernScreen.style.display = 'block';
        }

        function showAuthScreen() {
            loadingScreen.style.display = 'none';
            tavernScreen.style.display = 'none';
            authScreen.style.display = 'block';
        }

        // --- КНОПКА «НОВИЙ ПЕРСОНАЖ / ЗМІНИТИ» ---
        changeUserBtn.addEventListener('click', () => {
            localStorage.removeItem('active_pirate_name'); // Стираємо активного перса з пристрою
            usernameInput.value = "";
            termsCheckbox.checked = false;
            showAuthScreen(); // Повертаємо на екран реєстрації
        });

        usernameInput.addEventListener('input', () => {
            usernameError.style.display = 'none';
        });

        // --- РЕЄСТРАЦІЯ НОВОГО ПЕРСОНАЖА (ПРОСТИЙ INSERT) ---
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = usernameInput.value.trim();

            if (!termsCheckbox.checked) {
                alert("Ви повинні погодитися з умовами!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Перевірка...";

            try {
                // 1. Перевіряємо глобальну унікальність імені (чи не зайняте воно кимось іншим в усій грі)
                const { data: existingPlayer, error: searchError } = await supabase
                    .from('players')
                    .select('pirate_name')
                    .eq('pirate_name', username)
                    .maybeSingle();

                if (searchError) throw searchError;

                if (existingPlayer) {
                    usernameError.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Підняти вітрила";
                    return; 
                }

                // 2. Додаємо абсолютно новий рядок у таблицю (оскільки Unique з tg_id знято, запис пройде успішно)
                const { error: insertError } = await supabase
                    .from('players')
                    .insert([{ tg_id: tgId, pirate_name: username }]);

                if (insertError) throw insertError;

                // Запам'ятовуємо цього нового пірата як активного
                localStorage.setItem('active_pirate_name', username);
                
                submitBtn.innerText = "Успішно!";
                openTavern(username);
                
            } catch (err) {
                log("Помилка створення: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Підняти вітрила";
            }
        });

        // Запуск перевірки журналу
        checkAutoLogin();
    </script>
</body>
</html>
