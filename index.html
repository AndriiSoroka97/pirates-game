<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>☠ Пірати - Піратська пристань ☠</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
    
    <script>
    // Автоматично додаємо мітку часу до CSS, щоб скинути кеш
    const cssLink = document.createElement('link');
    cssLink.rel = 'stylesheet';
    cssLink.href = 'style.css?v=' + Date.now();
    document.head.appendChild(cssLink);
</script>
</head>
<body>

    <header>
        <h1>☠ Піратська пристань ☠</h1>
    </header>

    <main id="loadingScreen">
        <p>⚓ Перевірка суднового журналу... 🌊</p>
    </main>

    <div id="authScreen" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        
        <main class="login-container">
            <h2>Вхід на корабель</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Введіть ім'я свого пірата:</label>
                    <input type="text" id="loginUsername" placeholder="Твоє піратське ім'я" required autocomplete="off">
                    <div id="loginError" class="error-msg">Йо-хо-хо! Такого пірата немає, або він належить іншому ТГ-акаунту!</div>
                </div>
                <button type="submit" id="loginBtn" class="submit-btn">Увійти</button>
            </form>
        </main>

        <div class="or-divider">АБО</div>

        <main class="login-container">
            <h2>Новий персонаж</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Ім'я нового пірата:</label>
                    <input type="text" id="regUsername" placeholder="Наприклад, Чорна Борода" required autocomplete="off" maxlength="20">
                    <div id="regError" class="error-msg">Йо-хо-хо! Цей нікнейм уже зайнятий іншим піратом!</div>
                </div>
                <label class="terms-group">
                    <input type="checkbox" id="termsCheckbox">
                    <span>Я підтверджую умови гри.</span>
                </label>
                <button type="submit" id="registerBtn" class="submit-btn" style="background: #b79477; color: #fff;">Створити</button>
            </form>
        </main>

        <div style="width: 90%; max-width: 350px;">
            <div id="debugConsole" class="debug-box">Лог: Готовність модулів.</div>
        </div>
    </div>

    <main id="cityScreen" class="login-container" style="display: none; text-align: left; background: transparent; border: none; box-shadow: none; padding: 0;">
        </main>

    <footer>
        &copy; 2026 Гра "Пірати".
    </footer>

    <script>
    // Динамічно завантажуємо city.js із захистом від кешування
    const cityScript = document.createElement('script');
    cityScript.src = 'city.js?v=' + Date.now();
    // Як тільки скрипт міста завантажиться — ми запускаємо перевірку автологіну
    cityScript.onload = () => {
        checkAutoLogin();
    };
    document.body.appendChild(cityScript);
</script>

    <script>
        const debug = document.getElementById('debugConsole');
        function log(message) {
            if(debug) debug.innerText = "Лог: " + message;
        }

        const SUPABASE_URL = "https://gihdsrwyvonaewyngwnu.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_ldLuj_izEdq5ZKYfcOuojg_kiZB42In";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const tg = window.Telegram.WebApp;
        tg.expand();

        const loadingScreen = document.getElementById('loadingScreen');
        const authScreen = document.getElementById('authScreen');
        const cityScreen = document.getElementById('cityScreen');

        const loginForm = document.getElementById('loginForm');
        const loginUsernameInput = document.getElementById('loginUsername');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        const registerForm = document.getElementById('registerForm');
        const regUsernameInput = document.getElementById('regUsername');
        const regError = document.getElementById('regError');
        const termsCheckbox = document.getElementById('termsCheckbox');
        const registerBtn = document.getElementById('registerBtn');

        const tgUser = tg.initDataUnsafe?.user;
        if (!sessionStorage.getItem('browser_test_id')) {
            sessionStorage.setItem('browser_test_id', "TG_User_Test_999");
        }
        const tgId = tgUser ? String(tgUser.id) : sessionStorage.getItem('browser_test_id');

        loginUsernameInput.addEventListener('input', () => loginError.style.display = 'none');
        regUsernameInput.addEventListener('input', () => regError.style.display = 'none');

        // Автологін при старті
        async function checkAutoLogin() {
            const activePirate = localStorage.getItem('active_pirate_name');
            
            if (activePirate) {
                initCity(activePirate); 
                return;
            }

            try {
                const { data: players, error } = await supabase
                    .from('players')
                    .select('pirate_name')
                    .eq('tg_id', tgId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (players && players.length > 0) {
                    const latestPirate = players[0].pirate_name;
                    localStorage.setItem('active_pirate_name', latestPirate);
                    initCity(latestPirate);
                } else {
                    showAuthMenu();
                }
            } catch (err) {
                console.error(err);
                showAuthMenu();
                log("Помилка автологіну: " + err.message);
            }
        }

        function showAuthMenu() {
            loadingScreen.style.display = 'none';
            cityScreen.style.display = 'none';
            authScreen.style.display = 'flex';
        }

        // Вхід користувача
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = loginUsernameInput.value.trim();

            loginBtn.disabled = true;
            loginBtn.innerText = "Перевірка борту...";

            try {
                const { data: player, error } = await supabase
                    .from('players')
                    .select('pirate_name')
                    .eq('pirate_name', username)
                    .eq('tg_id', tgId)
                    .maybeSingle();

                if (error) throw error;

                if (player) {
                    localStorage.setItem('active_pirate_name', player.pirate_name);
                    loginBtn.innerText = "Увійти";
                    loginBtn.disabled = false;
                    initCity(player.pirate_name);
                } else {
                    loginError.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Увійти";
                }
            } catch (err) {
                log("Помилка входу: " + err.message);
                loginBtn.disabled = false;
                loginBtn.innerText = "Увійти";
            }
        });

        // Створення нового користувача
        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = regUsernameInput.value.trim();

            if (!termsCheckbox.checked) {
                alert("Ви повинні погодитися з умовами!");
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerText = "Будівництво корабля...";

            try {
                const { data: existingPlayer, error: searchError } = await supabase
                    .from('players')
                    .select('pirate_name')
                    .eq('pirate_name', username)
                    .maybeSingle();

                if (searchError) throw searchError;

                if (existingPlayer) {
                    regError.style.display = 'block';
                    registerBtn.disabled = false;
                    registerBtn.innerText = "Створити";
                    return; 
                }

                const { error: insertError } = await supabase
                    .from('players')
                    .insert([{ tg_id: tgId, pirate_name: username }]);

                if (insertError) throw insertError;

                localStorage.setItem('active_pirate_name', username);
                registerBtn.innerText = "Створити";
                registerBtn.disabled = false;
                initCity(username);
                
            } catch (err) {
                log("Помилка створення: " + err.message);
                registerBtn.disabled = false;
                registerBtn.innerText = "Створити";
            }
        });

    </script>
</body>
</html>
